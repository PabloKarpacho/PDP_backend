name: Deploy pdp-backend

on:
  push:
    branches: [ "**" ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pdp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pdp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRESQL_DSN: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/pdp
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Run Alembic migrations
        run: uv run python -m alembic upgrade head

      - name: Compile project
        run: uv run python -m compileall src tests __init__.py

      - name: Run unit tests
        run: uv run python -m pytest tests

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            /home/deploy/bin/deploy-backend.sh
